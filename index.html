<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vector Chatbot - Stefan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Baloo 2', cursive;
      background: linear-gradient(135deg, #fff7ed, #fde68a);
      background-size: 300% 300%;
      animation: bgFlow 20s ease infinite;
    }

    @keyframes bgFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .chatbox-3d {
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .chatbox-3d:hover {
      transform: rotateY(2deg) rotateX(2deg);
      box-shadow: 12px 16px 25px rgba(0, 0, 0, 0.15);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #f87171;
      border-radius: 6px;
    }

    .bubble-user {
      background-color: #fecaca;
      color: #7f1d1d;
      border-radius: 20px 20px 4px 20px;
    }

    .bubble-bot {
      background-color: #fef2f2;
      color: #374151;
      border-radius: 20px 20px 20px 4px;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-base text-gray-800">

  <!-- INTRO SECTION -->
  <div id="intro" class="p-6 flex flex-col md:flex-row items-center gap-6 text-center md:text-left">
    <!-- Human-like Avatar -->
    <div class="w-40 h-40">
      <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
        <circle cx="64" cy="64" r="60" fill="#f87171"/>
        <circle cx="64" cy="54" r="28" fill="#fff"/>
        <circle cx="52" cy="50" r="4" fill="#374151"/>
        <circle cx="76" cy="50" r="4" fill="#374151"/>
        <path d="M52 68 Q64 78 76 68" stroke="#374151" stroke-width="3" fill="none" stroke-linecap="round"/>
        <rect x="44" y="84" width="40" height="10" rx="5" fill="#fde68a"/>
      </svg>
    </div>

    <!-- Intro Text -->
    <div>
      <h1 class="text-5xl font-bold text-red-500 mb-3">Hey, I'm <span class="text-gray-800">Stefan</span></h1>
      <p class="text-xl text-gray-700 mb-6">I'm your assistant for <strong>Vector Classes</strong>. Ready to begin?</p>
      <button
        onclick="startChat()"
        class="bg-red-400 text-white px-6 py-3 rounded-full text-lg font-semibold hover:bg-red-500 transition"
      >
        🚀 Start Chat
      </button>
    </div>
  </div>

  <!-- CHAT UI -->
  <div id="chatbox" class="hidden w-full max-w-2xl p-6 rounded-3xl bg-white bg-opacity-95 border-4 border-red-300 chatbox-3d">
    <h2 class="text-4xl font-extrabold text-center text-red-500 mb-4 drop-shadow-lg">
      💬 Vector Coaching Classes - Chat Assitance
    </h2>

    <div id="chatlog" class="h-96 overflow-y-auto bg-red-50 border-2 border-gray-300 rounded-xl p-4 space-y-4">
      <!-- Messages appear here -->
    </div>

    <div class="flex mt-4">
      <input
        id="user_input"
        type="text"
        placeholder="Say hi or ask about courses..."
        class="flex-grow border-2 border-red-300 px-4 py-2 rounded-l-full focus:outline-none focus:ring-2 focus:ring-red-400"
      />
      <button
        onclick="sendMsg()"
        class="bg-red-500 text-white font-bold px-6 py-2 rounded-r-full hover:bg-red-600 transition duration-300"
      >
        ✉️ Send
      </button>
    </div>
  </div>

  <script>
    function startChat() {
      $("#intro").fadeOut(400, function () {
        $("#chatbox").removeClass("hidden").hide().fadeIn(600);
      });
    }

    function sendMsg() {
      const msg = $("#user_input").val().trim();
      if (!msg) return;

      $("#chatlog").append(
        `<div class='text-right'><span class='inline-block px-4 py-2 bubble-user'>You: ${msg}</span></div>`
      );
      $("#user_input").val("");

      $.post("/get", { msg: msg }, function (data) {
        $("#chatlog").append(
          `<div class='text-left'><span class='inline-block px-4 py-2 bubble-bot'>Stefan: ${data.response}</span></div>`
        );
        $("#chatlog").scrollTop($("#chatlog")[0].scrollHeight);
      });
    }

    $("#user_input").keypress(function (e) {
      if (e.which === 13) sendMsg();
    });
  </script>
</body>
</html>
